<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台灣結帳神算子 │ CYBER_PAY</title>
  <!-- Google Fonts: Rajdhani (Cyberpunk feeling) and Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Cyber grid overlay background -->
  <div class="cyber-grid"></div>
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>

  <!-- Wraps the app content for centering and styling -->
  <div class="forest-wrapper">
    <div class="app-container">
      
      <header class="cyber-header">
        <div class="header-title-wrap">
          <span class="cyber-glitch-tag">SYS_ONLINE</span>
          <h1>台灣結帳神算子</h1>
        </div>
        <p class="subtitle">⚡ CODE: 3-SEC_OPTIMIZER // 演算最佳支付協議</p>
      </header>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 輸入商場名稱或關鍵字 (例如：全聯、中油、7-11)...">
      </div>

      <div class="shortcut-section">
        <div class="shortcut-title-bar">
          <span class="cyber-label">⚡ 常用核心快捷紐 (MAX_4)</span>
          <button id="openConfigBtn" class="config-btn">⚙️ 改寫矩陣</button>
        </div>
        <div id="quickButtonsContainer" class="quick-buttons">
          <!-- Dynamically populated -->
        </div>
      </div>

      <div id="resultContainer" class="result-container">
        <p class="placeholder-text">⚡ 點擊上方數據節點，或輸入通路名稱激活 AI 核心演算...</p>
      </div>

      <footer class="disclaimer">
        [DATA_REF] 本終端優惠數據僅供參考，最終協議以各銀行與支付平台主機為準。<br>
        MATRIX_REVISION: 2026.06.16 // STABLE_VER
      </footer>
    </div>
  </div>

  <!-- Config Modal Dialog -->
  <div id="configModal" class="modal-overlay">
    <div class="modal-content cyber-modal-card">
      <h3>⚙️ 矩陣通路改寫 (最多4個)</h3>
      <p class="modal-subtitle">勾選的節點將會動態掛載至主畫面終端快捷列</p>
      <div id="merchantCheckboxGroup" class="checkbox-group">
        <!-- Dynamically populated -->
      </div>
      <div class="modal-actions">
        <button id="saveConfigBtn" class="save-btn">💾 寫入核心韌體 (保存)</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
